name: Terraform CI/CD

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::083636778104:role/GitHubActionsTerraformRole
          aws-region: us-east-1

      # All commands now use -chdir (no more working-directory default)
      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Terraform Validate
        run: terraform -chdir=terraform validate

      - name: Terraform Plan
        run: |
          terraform -chdir=terraform plan \
            -var "house_name=5marionct" \
            -var "tailscale_auth_key=${{ secrets.TAILSCALE_AUTH_KEY }}" \
            -var "telegram_bot_token=${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            -var "telegram_chat_id=${{ secrets.TELEGRAM_CHAT_ID }}"

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: |
          terraform -chdir=terraform apply -auto-approve \
            -var "house_name=5marionct" \
            -var "tailscale_auth_key=${{ secrets.TAILSCALE_AUTH_KEY }}" \
            -var "telegram_bot_token=${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            -var "telegram_chat_id=${{ secrets.TELEGRAM_CHAT_ID }}"
